# ================================
# SERVER CONFIG
# ================================
server.port=8080

# ================================
# DATABASE CONFIG (MySQL)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/resume_analyzer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=./uploads

# ================================
# JWT CONFIG
# ================================
jwt.secret=ThisIsAVerySecretKeyForJWTTokenGeneration12345678
jwt.expiration=86400000

# ================================
# PYTHON ML SERVICE URL
# ================================
ml.service.url=http://localhost:5000

# ================================
spring.mvc.cors.allowed-origins=https://romantic-amazement-production.up.railway.app,http://localhost:3000
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
# LOGGING
# ================================
logging.level.com.resumeanalyzer=DEBUG
logging.level.org.springframework.security=DEBUG
